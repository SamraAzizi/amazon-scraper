services:
  mongodb:
    image: mongo:7
    container_name: amazon_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: amazon_price_agent
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: amazon_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: amazon_api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=amazon_price_agent
      - QDRANT_URL=http://qdrant:6333
      - INNGEST_API_BASE_URL=http://inngest:8288
      - INNGEST_EVENT_API_BASE_URL=http://inngest:8288
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/docs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  inngest:
    image: node:20-slim
    container_name: amazon_inngest
    working_dir: /app
    ports:
      - "8288:8288"
    command: >
      sh -c "
        npm install -g inngest-cli@latest &&
        sleep 5 &&
        inngest-cli dev -u http://api:8000/api/inngest --no-discovery --port 8288 --host 0.0.0.0
      "
    depends_on:
      api:
        condition: service_healthy
    environment:
      - INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY:-}
      - INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY:-}

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: amazon_streamlit
    ports:
      - "8501:8501"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=amazon_price_agent
      - QDRANT_URL=http://qdrant:6333
      - INNGEST_API_BASE_URL=http://inngest:8288
      - INNGEST_EVENT_API_BASE_URL=http://inngest:8288
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_healthy
      inngest:
        condition: service_started

volumes:
  mongodb_data:
  qdrant_storage: